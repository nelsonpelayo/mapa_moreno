<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <title>Cuartel V - Zona III</title>

        <link rel="stylesheet" href="./resources/ol.css">
        <link rel="stylesheet" href="resources/fontawesome-all.min.css">
        <link rel="stylesheet" href="./resources/ol-layerswitcher.css">
        <link rel="stylesheet" href="./resources/qgis2web.css">
        
        <style>
        html, body, #map {
            width: 100%; height: 100%; padding: 0; margin: 0; background-color: #ffffff;
        }

        /* --- ESTILOS PC --- */
        #titulo-mapa {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            font-family: 'Arial', sans-serif;
            font-size: 26px; 
            color: #000;
            text-align: center;
            width: 70%;
            pointer-events: none;
        }

        #logo-institucional {
            position: absolute;
            top: 10px;
            right: 15px;
            z-index: 1002;
            height: 55px;
            width: auto;
        }

        #pie-direccion {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            font-family: 'Arial', sans-serif;
            font-size: 16px;
            color: #888888;
            text-align: center;
            width: 90%;
        }

        .layer-switcher {
            margin-top: 130px !important;
        }

        /* --- AJUSTES MÓVIL --- */
        @media (max-width: 600px) {
            #logo-institucional {
                height: 20px !important; 
                top: 10px;
                right: 10px;
            }
            #titulo-mapa {
                font-size: 12px;
                top: 40px;
                width: 85%;
            }
            #pie-direccion {
                font-size: 9px;
                bottom: 10px; 
            }
            .layer-switcher {
                margin-top: 100px !important;
            }
        }
        </style>
    </head>

    <body>
        <div id="map">
            <div id="popup" class="ol-popup">
                <a href="#" id="popup-closer" class="ol-popup-closer"></a>
                <div id="popup-content"></div>
            </div>
        </div>

        <img id="logo-institucional" src="2026logo.png">

        <div id="titulo-mapa">
            <strong>Calles Nombradas en Honor a los Desaparecidos<br>
            Cuartel V - Zona III</strong>
        </div>
        
        <div id="pie-direccion">Dirección General de Proyectos de Hábitat, Vivienda e Integración Urbana</div>

        <script src="resources/qgis2web_expressions.js"></script>
        <script src="./resources/functions.js"></script>
        <script src="./resources/ol.js"></script>
        <script src="./resources/ol-layerswitcher.js"></script>
        <script src="./layers/layers.js"></script> 
        <script src="./resources/qgis2web.js"></script>

        <script>
            // Ajuste de centrado para móvil (Solo si es pantalla chica)
            if (window.innerWidth < 600 && typeof map !== 'undefined') {
                setTimeout(function() {
                    map.getView().setZoom(13.8);
                    // Coordenada para centrar los barrios en el celular (hacia la DERECHA)
                    map.getView().setCenter([-6541500.00, -4104600.00]);
                }, 1500);
            }
        </script>
    </body>
</html>
