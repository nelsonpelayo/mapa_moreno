<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <title>Mapa Cuartel V</title>

        <link rel="stylesheet" href="./resources/ol.css">
        <link rel="stylesheet" href="resources/fontawesome-all.min.css">
        <link rel="stylesheet" href="./resources/ol-layerswitcher.css">
        <link rel="stylesheet" href="./resources/qgis2web.css">
        
        <style>
        html, body, #map { width: 100%; height: 100%; padding: 0; margin: 0; background-color: #ffffff; }
        #titulo-mapa { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 2000; font-family: sans-serif; font-size: 24px; text-align: center; width: 80%; pointer-events: none; text-shadow: 2px 2px 4px white; color: black; }
        #logo-institucional { position: absolute; top: 10px; right: 10px; z-index: 2001; height: 50px; width: auto; }
        #pie-direccion { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); z-index: 2000; font-family: sans-serif; font-size: 14px; color: #888; text-align: center; width: 90%; }
        
        .layer-switcher { margin-top: 110px !important; }

        @media (max-width: 600px) {
            #titulo-mapa { font-size: 14px; top: 45px; }
            #logo-institucional { height: 25px; }
            .layer-switcher { margin-top: 85px !important; }
        }
        </style>
    </head>
    <body>
        <div id="map">
            <div id="popup" class="ol-popup">
                <a href="#" id="popup-closer" class="ol-popup-closer"></a>
                <div id="popup-content"></div>
            </div>
        </div>

        <img id="logo-institucional" src="2026logo.png">
        <div id="titulo-mapa">
            <strong>Calles Nombradas en Honor a los Desaparecidos<br>Cuartel V - Zona III</strong>
        </div>
        <div id="pie-direccion">Dirección General de Proyectos de Hábitat, Vivienda e Integración Urbana</div>

        <script src="resources/qgis2web_expressions.js"></script>
        <script src="resources/functions.js"></script>
        <script src="resources/ol.js"></script>
        <script src="resources/ol-layerswitcher.js"></script>
        <script src="resources/Autolinker.min.js"></script>

        <script src="layers/Reserva_Equipamientos_3.js"></script>
        <script src="layers/LocalidadesMoreno_4.js"></script>
        <script src="layers/BarriosPopulares_5.js"></script>
        <script src="layers/CallesMloreno_6.js"></script>
        <script src="layers/CursodeAgua_7.js"></script>
        <script src="layers/CallesNombradasenHonoraLosDesaparecidos_8.js"></script>

        <script src="layers/layers.js"></script>
        <script src="resources/qgis2web.js"></script>

        <script>
            window.addEventListener('load', function() {
                if (typeof map !== 'undefined' && window.innerWidth < 600) {
                    setTimeout(function() {
                        map.getView().setZoom(13.8);
                        // Coordenada ajustada para centrar hacia la derecha en móvil
                        map.getView().setCenter([-6541500.00, -4104600.00]);
                    }, 500);
                }
            });
        </script>
    </body>
</html>
