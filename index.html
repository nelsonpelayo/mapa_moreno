<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <title>Cuartel V - Zona III</title>

        <link rel="stylesheet" href="./resources/ol.css">
        <link rel="stylesheet" href="resources/fontawesome-all.min.css">
        <link rel="stylesheet" href="./resources/ol-layerswitcher.css">
        <link rel="stylesheet" href="./resources/qgis2web.css">
        
        <style>
        html, body, #map {
            width: 100%; height: 100%; padding: 0; margin: 0; background-color: #ffffff;
        }

        /* --- ESTILOS PC --- */
        #titulo-mapa {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            font-family: 'Arial', sans-serif;
            font-size: 26px; 
            color: #000;
            text-align: center;
            width: 70%;
            pointer-events: none;
        }

        #logo-institucional {
            position: absolute;
            top: 10px;
            right: 15px;
            z-index: 1002;
            height: 55px;
            width: auto;
        }

        #pie-direccion {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            font-family: 'Arial', sans-serif;
            font-size: 16px;
            color: #888888;
            text-align: center;
            width: 90%;
        }

        /* PC: Ajustado a 135px para que no choque pero no quede tan abajo */
        .layer-switcher {
            margin-top: 135px !important;
        }

        /* --- AJUSTES EXCLUSIVOS PARA MÓVIL --- */
        @media (max-width: 600px) {
            #logo-institucional {
                height: 20px !important; 
                top: 10px;
                right: 10px;
            }

            #titulo-mapa {
                font-size: 12px;
                top: 40px;
                width: 85%;
            }

            #pie-direccion {
                font-size: 9px;
                bottom: 8px; 
                color: #888888;
            }

            .layer-switcher {
                margin-top: 110px !important;
            }
        }

        .layer-switcher ul::before {
            content: "Referencias";
            display: block;
            font-family: 'Arial', sans-serif;
            font-weight: bold;
            font-size: 18px;
            text-align: center;
            border-bottom: 1px solid #eee;
            margin-bottom: 5px;
        }
        </style>
    </head>

    <body>
        <img id="logo-institucional" src="2026logo.png">

        <div id="titulo-mapa">
            <strong>Calles Nombradas en Honor a los Desaparecidos<br>
            Cuartel V - Zona III</strong>
        </div>
        
        <div id="pie-direccion">Dirección General de Proyectos de Hábitat, Vivienda e Integración Urbana</div>

        <div id="map"></div>

        <script src="resources/qgis2web_expressions.js"></script>
        <script src="./resources/functions.js"></script>
        <script src="./resources/ol.js"></script>
        <script src="./resources/ol-layerswitcher.js"></script>
        
        <script src="layers/Reserva_Equipamientos_3.js"></script>
        <script src="layers/LocalidadesMoreno_4.js"></script>
        <script src="layers/BarriosPopulares_5.js"></script>
        <script src="layers/CallesMloreno_6.js"></script>
        <script src="layers/CursodeAgua_7.js"></script>
        <script src="layers/CallesNombradasenHonoraLosDesaparecidos_8.js"></script>
        
        <script src="styles/Reserva_Equipamientos_3_style.js"></script>
        <script src="styles/LocalidadesMoreno_4_style.js"></script>
        <script src="styles/BarriosPopulares_5_style.js"></script>
        <script src="styles/CallesMloreno_6_style.js"></script>
        <script src="styles/CursodeAgua_7_style.js"></script>
        <script src="styles/CallesNombradasenHonoraLosDesaparecidos_8_style.js"></script>
        
        <script src="./layers/layers.js"></script> 
        <script src="./resources/qgis2web.js"></script>

        <script>
            var isSmallScreen = window.innerWidth < 600;
            setTimeout(function() {
                if (isSmallScreen && typeof map !== 'undefined') {
                    map.getView().setZoom(13.8); 
                    // CENTRADO MÓVIL: Ajustado para que quede al medio
                    map.getView().setCenter([-6545000.00, -4104600.00]);
                }
            }, 800);
        </script>
    </body>
</html>
