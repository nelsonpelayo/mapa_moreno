<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <title>Cuartel V - Zona III</title>

        <link rel="stylesheet" href="./resources/ol.css">
        <link rel="stylesheet" href="resources/fontawesome-all.min.css">
        <link rel="stylesheet" href="./resources/ol-layerswitcher.css">
        <link rel="stylesheet" href="./resources/qgis2web.css">
        
        <style>
        html, body, #map {
            width: 100%; height: 100%; padding: 0; margin: 0; background-color: #ffffff;
        }

        /* --- ESTILOS PARA PC --- */
        #titulo-mapa {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            font-family: 'Arial', sans-serif;
            font-size: 26px; 
            color: #000;
            text-align: center;
            width: 70%;
            pointer-events: none;
        }

        #logo-institucional {
            position: absolute;
            top: 10px;
            right: 15px;
            z-index: 1002;
            height: 55px;
            width: auto;
        }

        #pie-direccion {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            font-family: 'Arial', sans-serif;
            font-size: 16px;
            color: #888888;
            text-align: center;
            width: 90%;
        }

        .layer-switcher {
            margin-top: 130px !important;
        }

        /* --- AJUSTES PARA MÓVIL --- */
        @media (max-width: 600px) {
            #logo-institucional {
                height: 20px !important; 
                top: 10px;
                right: 10px;
            }

            #titulo-mapa {
                font-size: 12px;
                top: 40px;
                width: 85%;
            }

            #pie-direccion {
                font-size: 9px;
                bottom: 10px; 
                color: #888888;
            }

            .layer-switcher {
                margin-top: 90px !important;
            }
        }

        /* ESTILO DEL POPUP PARA QUE NO ROMPA EL DISEÑO */
        .ol-popup {
            position: absolute;
            background-color: white;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #cccccc;
            bottom: 12px;
            left: -50px;
            min-width: 280px;
            display: none; /* Se oculta hasta que se haga clic */
        }
        </style>
    </head>

    <body>
        <img id="logo-institucional" src="2026logo.png">

        <div id="titulo-mapa">
            <strong>Calles Nombradas en Honor a los Desaparecidos<br>
            Cuartel V - Zona III</strong>
        </div>
        
        <div id="pie-direccion">Dirección General de Proyectos de Hábitat, Vivienda e Integración Urbana</div>

        <div id="map">
            <div id="popup" class="ol-popup">
                <a href="#" id="popup-closer" class="ol-popup-closer"></a>
                <div id="popup-content"></div>
            </div>
        </div>

        <script src="resources/qgis2web_expressions.js"></script>
        <script src="./resources/functions.js"></script>
        <script src="./resources/ol.js"></script>
        <script src="./resources/ol-layerswitcher.js"></script>
        <script src="./layers/layers.js"></script> 
        <script src="./resources/qgis2web.js"></script>

        <script>
            // Ajuste de centrado real para móvil
            if (window.innerWidth < 600 && typeof map !== 'undefined') {
                setTimeout(function() {
                    var view = map.getView();
                    view.setZoom(13.8);
                    // Coordenada corregida para centrar Cuartel V en el móvil
                    view.setCenter([-6544000.00, -4104600.00]);
                }, 1200);
            }
        </script>
    </body>
</html>
