<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <title>Cuartel V - Zona III</title>

        <link rel="stylesheet" href="./resources/ol.css">
        <link rel="stylesheet" href="resources/fontawesome-all.min.css">
        <link href="resources/photon-geocoder-autocomplete.min.css" rel="stylesheet">
        <link rel="stylesheet" href="./resources/ol-layerswitcher.css">
        <link rel="stylesheet" href="./resources/qgis2web.css">
        
        <style>
        html, body, #map {
            width: 100%; height: 100%; padding: 0; margin: 0; background-color: #ffffff;
        }

        /* --- ESTILOS PC (Escritorio) --- */
        #titulo-mapa {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            font-family: 'Arial', sans-serif;
            font-size: 28px; 
            color: #000000;
            text-align: center;
            text-shadow: 2px 2px 5px rgba(255,255,255,0.8);
            pointer-events: none;
            width: 80%;
        }

        #logo-institucional {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1002;
            height: 60px;
            width: auto;
            pointer-events: none;
        }

        #pie-direccion {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            font-family: 'Arial', sans-serif;
            font-size: 18px;
            color: #444;
            text-align: center;
            width: 90%;
            pointer-events: none;
        }

        /* --- AJUSTES EXCLUSIVOS PARA MÓVIL --- */
        @media (max-width: 600px) {
            #logo-institucional {
                height: 35px; /* Logo más chico */
                top: 5px;
                left: 50%;
                right: auto;
                transform: translateX(-50%); /* Centrado arriba */
            }

            #titulo-mapa {
                font-size: 13px;
                top: 45px; /* Bajamos el título para que no se choque con el logo */
                width: 95%;
                background-color: rgba(255,255,255,0.6);
                padding: 5px 0;
                border-radius: 5px;
            }

            #pie-direccion {
                font-size: 10px;
                bottom: 10px;
                background-color: rgba(255,255,255,0.8); /* Fondo para que se lea sí o sí */
                padding: 5px;
                width: 100%;
                color: #000;
                font-weight: bold;
                border-top: 1px solid #ccc;
            }

            /* Bajamos la leyenda para que no tape el título */
            .layer-switcher {
                margin-top: 130px !important;
            }
        }

        /* Estilos generales de la leyenda */
        .layer-switcher ul::before {
            content: "Referencias";
            display: block;
            font-family: 'Arial', sans-serif;
            font-weight: bold;
            font-size: 22px;
            color: #333;
            text-align: center;
            border-bottom: 2px solid #eee;
            margin-bottom: 10px;
        }

        .ol-control { background-color: rgba(255,255,255,.4) !important; padding: 2px !important; } 
        </style>
    </head>

    <body>
        <img id="logo-institucional" src="2026logo.png" alt="Logo Moreno IDUAR">

        <div id="titulo-mapa">
            <strong>Calles Nombradas en Honor a los Desaparecidos<br>
            Cuartel V - Zona III</strong>
        </div>
        
        <div id="pie-direccion">Dirección General de Proyectos de Hábitat, Vivienda e Integración Urbana</div>

        <div id="map">
            <div id="popup" class="ol-popup">
                <a href="#" id="popup-closer" class="ol-popup-closer"></a>
                <div id="popup-content"></div>
            </div>
        </div>

        <script src="resources/qgis2web_expressions.js"></script>
        <script src="./resources/functions.js"></script>
        <script src="./resources/ol.js"></script>
        <script src="./resources/ol-layerswitcher.js"></script>
        <script src="resources/photon-geocoder-autocomplete.min.js"></script>
        
        <script src="layers/Reserva_Equipamientos_3.js"></script>
        <script src="layers/LocalidadesMoreno_4.js"></script>
        <script src="layers/BarriosPopulares_5.js"></script>
        <script src="layers/CallesMloreno_6.js"></script>
        <script src="layers/CursodeAgua_7.js"></script>
        <script src="layers/CallesNombradasenHonoraLosDesaparecidos_8.js"></script>
        
        <script src="styles/Reserva_Equipamientos_3_style.js"></script>
        <script src="styles/LocalidadesMoreno_4_style.js"></script>
        <script src="styles/BarriosPopulares_5_style.js"></script>
        <script src="styles/CallesMloreno_6_style.js"></script>
        <script src="styles/CursodeAgua_7_style.js"></script>
        <script src="styles/CallesNombradasenHonoraLosDesaparecidos_8_style.js"></script>
        
        <script src="./layers/layers.js" type="text/javascript"></script> 
        <script src="./resources/Autolinker.min.js"></script>
        <script src="./resources/qgis2web.js"></script>

        <script>
            var isSmallScreen = window.innerWidth < 600;
            if (isSmallScreen && typeof map !== 'undefined') {
                map.getView().setZoom(13.2); // Aleja el mapa para que se vea más área
            }
        </script>
    </body>
</html>
